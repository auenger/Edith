# Feature Workflow 配置
# 项目: JARVIS — AI 知识基础设施

# 项目信息
project:
  name: JARVIS
  main_branch: main
  repo_path: .

  # 以文档和规范为主的项目，仅含一个 Python 脚本
  tech_stack: markdown-docs

  test_framework: none

# 并行控制
parallelism:
  max_concurrent: 1

# Git 设置
git:
  remote: origin
  auto_push: false
  merge_strategy: "--no-ff"
  push_tags: true

# 分支策略
branch_prefix: feature
worktree_prefix: JARVIS
worktree_base: ..

# 工作流设置
workflow:
  auto_start: false
  auto_start_next: true
  require_checklist: true
  subagent_timeout: 20

  # 需求切分
  splitting:
    enabled: true
    threshold: 3
    auto_enrich: true

  # 需求审查
  review:
    enabled: true
    after_enrich: true
    min_score: 70
    auto_block: false

  # 测试配置（文档项目无自动化测试）
  testing:
    pytest_enabled: false
    junit_enabled: false
    test_dir: ""
    coverage_enabled: false
    coverage_target: 0

# 归档配置
completion:
  archive:
    create_tag: true
    tag_format: "{id}-{date}"
    tag_date_format: "%Y%m%d"

  cleanup:
    delete_worktree: true
    delete_branch: true

  record:
    update_spec: true
    update_archive_log: true

# 命名规则
naming:
  feature_prefix: feat
  branch_prefix: feature
  worktree_prefix: JARVIS

# 路径配置
paths:
  features_dir: features
  archive_dir: features/archive
  worktree_base: ..
  repo_path: .
