    description: |
      EDITH Phase 2：从"代码侧知识引擎"升级为"全栈知识基础设施"。
      包含 Agent 侧集成（MarkItDown 多模态摄入 + Graphify 认知图谱索引）
      和 Board 侧（Web 看板 5 个页面 + 部署）。

  - id: feat-p2-multimodal-ingestion
    name: "MarkItDown 多模态摄入"
    priority: 85
    size: S
    dependencies: []
    parent: feat-phase2
    description: |
      扩展 edith_scan 输入范围：PDF/Office/图片/音频 → 结构化 Markdown。
      支持 LLM Vision 图表理解和隐私模式本地化处理。

  - id: feat-p2-graphify-index
    name: "Graphify 认知图谱索引"
    priority: 80
    size: M
    dependencies: []
    parent: feat-phase2
    description: |
      集成 Graphify 作为 Layer 2 索引引擎。tree-sitter AST 提取 → graph.json
      全局拓扑 → 自动生成 routing-table / distillates 骨架 / Board 图谱数据源。

  - id: feat-p2-board-scaffold
    name: "Board 项目脚手架 + Git 数据层"
    priority: 75
    size: M
    dependencies: []
    parent: feat-phase2
    description: |
      初始化 EDITH Board 项目（Next.js + Fastify API Server）+
      Git 知识仓库只读读取层 + 文件变更监听 + WebSocket 推送。

  - id: feat-p2-board-dashboard
    name: "Dashboard 总览仪表盘"
    priority: 70
    size: M
    dependencies: [feat-p2-board-scaffold]
    parent: feat-phase2
    description: |
      知识库健康度面板、服务覆盖率、最近变更时间线、
      产出物统计、快速操作入口。WebSocket 实时更新。

  - id: feat-p2-board-explorer
    name: "Services + Artifacts 浏览器"
    priority: 65
    size: M
    dependencies: [feat-p2-board-scaffold]
    parent: feat-phase2
    description: |
      Services 列表页（筛选搜索 + 知识覆盖详情 + Layer 补全操作）+
      Artifacts 文件树 + Markdown 预览 + Token 计数。

  - id: feat-p2-knowledge-map
    name: "Knowledge Map 知识图谱可视化"
    priority: 60
    size: M
    dependencies: [feat-p2-graphify-index, feat-p2-board-scaffold]
    parent: feat-phase2
    description: |
      D3.js 力导向图可视化服务依赖关系。消费 graph.json 数据。
      节点大小=知识完整度，线条粗细=调用频率。
      服务依赖 + 概念拓扑双视图。置信度标注着色。

  - id: feat-p2-timeline
    name: "Timeline 知识时间线"
    priority: 55
    size: S
    dependencies: [feat-p2-board-scaffold]
    parent: feat-phase2
    description: |
      知识回写历史时间线。聚合 Git 提交历史、扫描/蒸馏/摄入日志。
      按月份分组、事件类型筛选、分页加载。


