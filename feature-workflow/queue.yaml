pending:
  # ═══ Phase 1.3: Agent 增强命令集 ═══
  - id: feat-context-command
    name: "Context 上下文查看命令"
    priority: 70
    size: S
    description: |
      /context 命令：显示当前 session 的 token 用量、占比、
      对话轮次、工具调用统计。类似 Claude Code 的 context bar。

  - id: feat-explore-project
    name: "项目探索命令"
    priority: 65
    size: M
    description: |
      /explore 命令：快速浏览项目结构、技术栈、关键文件。
      轻量级概览，区别于 edith_scan 的深度扫描。

  - id: feat-subagent-support
    name: "SubAgent 子代理支持"
    priority: 55
    size: M
    description: |
      /delegate 命令 + SubAgentManager：将耗时任务委派给
      独立子代理执行，支持并行和串行模式。
      基于 pi SDK 子进程模式实现。

  # ═══ Phase 1.5: TUI 交互重设计 ═══
  - id: feat-tui-ink-layout
    name: "TUI 布局框架（ink）"
    priority: 70
    size: M
    parent: feat-tui-redesign
    description: |
      使用 ink (React for CLI) 替换 readline REPL，
      构建全屏 TUI 布局：顶部 Logo、中间内容区、底部输入框。

  - id: feat-tui-thinking
    name: "AI 思考过程展示（折叠展开式）"
    priority: 65
    size: S
    dependencies: [feat-tui-ink-layout]
    parent: feat-tui-redesign
    description: |
      AI 思考过程折叠式展示，默认一行摘要，按 T 展开。

  - id: feat-tui-streaming
    name: "流式输出增强（Markdown 渲染 + 进度指示）"
    priority: 60
    size: M
    dependencies: [feat-tui-ink-layout]
    parent: feat-tui-redesign
    description: |
      终端 Markdown 渲染、代码高亮、工具调用进度指示器。

  - id: feat-tui-context-monitor
    name: "Context 上下文主动监控与预警"
    priority: 68
    size: M
    dependencies: [feat-tui-ink-layout, feat-context-command]
    parent: feat-tui-redesign
    description: |
      常驻状态栏展示 token 用量/缓存命中率，上下文即将不足时
      主动预警，compact 前提示信息丢失风险。

