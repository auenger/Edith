# ═══ LLM Configuration ══════════════════════════════════════════
# 多 Provider 配置模式 — 在 profiles 下定义多个 Provider，通过 active 切换。
# 旧格式（单 provider/model）仍然兼容，启动时自动转为 profiles.default。

llm:
  active: xiaomi                     # 当前使用的 profile 名
  profiles:
    deepseek:
      provider: deepseek
      model: deepseek-v4-pro
      context_window: 1000000        # DeepSeek V4 Pro 1M 上下文
      # api_key 走环境变量 ${DEEPSEEK_API_KEY}

    xiaomi:
      provider: xiaomi
      model: mimo-v2.5-pro
      api_key: tp-cb81ga6mknuli6xrdlabplfqms6yih7wz2yj3knypy9zvwxx
      base_url: https://token-plan-cn.xiaomimimo.com/v1
      context_window: 131072         # 模型上下文窗口（tokens），可在配置文件中调整

    # ═══ Anthropic 协议 Provider 预设模板 ═══
    # 取消注释并填入 API Key 即可使用。
    # api_type: anthropic 表示使用 Anthropic Messages API 协议。

    # minimax:
    #   provider: minimax
