    #   api_key: ${MINIMAX_API_KEY}
    #   base_url: https://api.minimaxi.com/anthropic
    #   api_type: anthropic           # 使用 Anthropic 协议
    #   context_window: 1000000       # MiniMax M2.7 支持 1M 上下文

    # zhipu:
