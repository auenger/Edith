# ═══ Workspace ══════════════════════════════════════════════════

workspace:
  root: ./company-edith
  language: zh

repos:
  - name: edith-repo
    path: /Users/ryan/mycode/EDITH-e2e-pilot
  - name: LiteMes
    path: /Users/ryan/mycode/LiteMes
  - name: DoNetMes
    path: /Users/ryan/DoNetMes

agent:
  token_budget:
    routing_table: 500
    quick_ref: 2000
    distillate_fragment: 4000
  auto_refresh: true
  refresh_interval: 24h

context_monitor:
  enabled: true                # 开关
  thresholds:                  # 预警阈值（百分比）
    warning: 70                # 黄色预警
    critical: 85               # 橙色预警
    emergency: 95              # 红色紧急

# Optional theme configuration (defaults shown)
# theme:
#   style: "arc-reactor"        # arc-reactor (default) | minimal | classic
#   color_scheme: "iron-man"    # iron-man (default) | warm | monochrome
#   show_reactor: true           # show Arc Reactor LOGO on startup
