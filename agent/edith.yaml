# ═══ LLM Configuration ══════════════════════════════════════════
# 多 Provider 配置模式 — 在 profiles 下定义多个 Provider，通过 active 切换。
# 旧格式（单 provider/model）仍然兼容，启动时自动转为 profiles.default。

llm:
  active: deepseek                     # 当前使用的 profile 名
  profiles:
    deepseek:
      provider: deepseek
      model: deepseek-v4-pro
      # api_key 走环境变量 ${DEEPSEEK_API_KEY}

    xiaomi:
      provider: xiaomi
      model: MiMo-V2.5-Pro
      api_key: tp-cb81ga6mknuli6xrdlabplfqms6yih7wz2yj3knypy9zvwxx
      base_url: https://token-plan-cn.xiaomimimo.com/v1

    # local-ollama:
    #   provider: ollama
    #   model: qwen3:32b
    #   base_url: http://localhost:11434/v1

  # 旧格式（向后兼容，无 profiles 时自动使用）:
  # provider: deepseek
  # model: deepseek-v4-pro

# ═══ Workspace ══════════════════════════════════════════════════

workspace:
  root: ./company-edith
  language: zh

repos:
  - name: edith-repo
    path: /Users/ryan/mycode/EDITH-e2e-pilot

agent:
  token_budget:
    routing_table: 500
    quick_ref: 2000
    distillate_fragment: 4000
  auto_refresh: true
  refresh_interval: 24h

context_monitor:
  enabled: true                # 开关
  thresholds:                  # 预警阈值（百分比）
    warning: 70                # 黄色预警
    critical: 85               # 橙色预警
    emergency: 95              # 红色紧急

# Optional theme configuration (defaults shown)
# theme:
#   style: "arc-reactor"        # arc-reactor (default) | minimal | classic
#   color_scheme: "iron-man"    # iron-man (default) | warm | monochrome
#   show_reactor: true           # show Arc Reactor LOGO on startup
